name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build Dependencies
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Bun and install dependencies
        uses: ./.github/actions/setup

      - name: Build workspace packages
        run: bun ws "packages/*" build

      - name: Build docs (generates .source)
        run: bun ws docs build

      - name: Build docs (diffshub)
        run: NEXT_PUBLIC_SITE=diffshub bun ws docs build

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-output
          path: |
            packages/*/dist/
            apps/docs/.source/
            apps/docs/.next/
          retention-days: 1

  lint:
    name: Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Bun and install dependencies
        uses: ./.github/actions/setup

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: build-output

      - name: Run Lint
        run: bun run lint

  stylelint:
    name: Stylelint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Bun and install dependencies
        uses: ./.github/actions/setup

      - name: Run Stylelint
        run: bun run lint:css

  format:
    name: Format
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Bun and install dependencies
        uses: ./.github/actions/setup

      - name: Run Format check
        run: bun run format:check

  test:
    name: Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Bun and install dependencies
        uses: ./.github/actions/setup

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: build-output

      - name: Run unit tests (all packages)
        run: bun ws "packages/*" test --sequential

      - name: Mount Playwright browsers
        uses: useblacksmith/stickydisk@13af8883542ca949a717e70fef89d15edbb29d88 # v1.2.0
        with:
          key: ${{ github.repository }}-playwright-browsers-${{ runner.os }}
          path: ~/.cache/ms-playwright
      - name: Install Playwright browser - trees
        run: bunx playwright@1.51.1 install --with-deps chromium

      - name: Run tests - trees e2e
        run: bun ws trees test:e2e

  typecheck:
    name: TypeScript
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Bun and install dependencies
        uses: ./.github/actions/setup

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: build-output

      - name: Type check all workspaces
        run: bun run ws "*" tsc
